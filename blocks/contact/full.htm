<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
  <tr>
    <td style="font-family:'Arial',sans-serif; font-size:13.5pt; font-weight:bold; color:#000; padding-bottom:2px;">
      @@FirstName@@&nbsp;@@LastName@@
    </td>
  </tr>
  <tr>
    <td style="font-family:'Arial',sans-serif; font-size:10.5pt; color:#000; padding-bottom:2px;">
      @@JobTitle@@
    </td>
  </tr>
  <tr>
    <td style="font-family:'Arial',sans-serif; font-size:10.5pt; color:#000; padding-bottom:6px;">
      @@CompanyName@@
    </td>
  </tr>
  <tr>
    <td style="border-bottom:1px solid #5BC5F2; padding-bottom:6px; font-size:0; line-height:0;">&nbsp;</td>
  </tr>
  <tr>
    <td style="padding-top:6px; font-family:'Arial',sans-serif; font-size:10pt; color:#000;">
      <a href="tel:@@TelefonNumber@@" style="color:#000; text-decoration:none;">@@TelefonNumber@@</a>
    </td>
  </tr>
  <tr>
    <td style="font-family:'Arial',sans-serif; font-size:10pt; color:#000; padding-bottom:2px;">
      <a href="mailto:@@MailAddress@@" style="color:#000; text-decoration:none;">@@MailAddress@@</a>
    </td>
  </tr>
  <tr>
    <td style="font-family:'Arial',sans-serif; font-size:10pt; color:#000; padding-bottom:6px;">
      <a href="https://@@WebsiteUrl@@" style="color:#000; text-decoration:none;">@@WebsiteUrl@@</a>
    </td>
  </tr>
</table>
