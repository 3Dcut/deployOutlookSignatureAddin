<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>acadon Signatur</title>
  <link rel="stylesheet" href="taskpane.css">
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>acadon Signatur</h1>
    </header>

    <!-- Loading -->
    <div id="loading" class="panel">
      <div class="spinner"></div>
      <p class="info-text">Lade Benutzerdaten...</p>
    </div>

    <!-- Error -->
    <div id="error-panel" class="panel hidden">
      <p class="error-text" id="error-message"></p>
      <button id="retry-btn" class="btn btn-secondary">Erneut versuchen</button>
    </div>

    <!-- Main Form -->
    <div id="main-form" class="panel hidden">

      <!-- Benutzereinstellungen -->
      <details class="form-section accordion" open>
        <summary><h2>Benutzereinstellungen</h2></summary>
        <div class="accordion-content">
          <div class="field-row">
            <label for="firstName">Vorname</label>
            <input type="text" id="firstName" readonly>
          </div>
          <div class="field-row">
            <label for="lastName">Nachname</label>
            <input type="text" id="lastName" readonly>
          </div>
          <div class="field-row">
            <label for="jobTitle">Titel / Position</label>
            <input type="text" id="jobTitle" placeholder="Aus Azure AD">
          </div>
          <div class="field-row">
            <label for="phone">Telefon</label>
            <input type="text" id="phone" placeholder="Aus Azure AD">
          </div>
          <div class="field-row">
            <label for="email">E-Mail</label>
            <input type="text" id="email" readonly>
          </div>
          <div class="field-row">
            <label for="office">Standort</label>
            <input type="text" id="office" readonly>
          </div>
          <div class="field-row">
            <label for="address">Adresse</label>
            <input type="text" id="address" readonly>
          </div>
          <div class="button-row">
            <button class="btn btn-secondary btn-small save-btn" type="button">Einstellungen speichern</button>
          </div>
        </div>
      </details>

      <!-- Standardsignaturen -->
      <details class="form-section accordion">
        <summary><h2>Standardsignaturen</h2></summary>
        <div class="accordion-content">
          <div class="field-row">
            <label for="assignNewMessage">Neue Nachrichten</label>
            <select id="assignNewMessage"></select>
          </div>
          <div class="field-row">
            <label for="assignReply">Antworten</label>
            <select id="assignReply"></select>
          </div>
          <div class="button-row">
            <button class="btn btn-secondary btn-small save-btn" type="button">Zuweisung speichern</button>
          </div>
        </div>
      </details>

      <!-- Signaturen bearbeiten -->
      <details class="form-section accordion" open>
        <summary><h2>Signaturen bearbeiten</h2></summary>
        <div class="accordion-content">
          <!-- Filter row -->
          <div class="filter-row">
            <div class="filter-item">
              <label for="filterLang">Sprache</label>
              <select id="filterLang">
                <option value="all">Alle</option>
                <option value="DE">DE</option>
                <option value="EN">EN</option>
                <option value="CH">CH</option>
                <option value="DK">DK</option>
                <option value="FR">FR</option>
                <option value="NL">NL</option>
              </select>
            </div>
            <div class="filter-item">
              <label for="filterType">Typ</label>
              <select id="filterType">
                <option value="all">Alle</option>
                <option value="long">Lang</option>
                <option value="short">Kurz</option>
              </select>
            </div>
          </div>

          <!-- Signature list -->
          <div id="sig-list" class="sig-list"></div>

          <button id="new-sig-btn" class="btn btn-secondary btn-small" type="button" style="margin-top:8px;">+ Neue Signatur</button>

          <!-- Signature Editor -->
          <div id="sig-editor-section" class="hidden" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee;">
            <h3>Eigenschaften</h3>
            <div class="field-row">
              <label for="sigName">Name</label>
              <input type="text" id="sigName" placeholder="z.B. Standard Deutsch">
            </div>
            <div class="field-row">
              <label for="sigLang">Sprache</label>
              <select id="sigLang">
                <option value="DE">Deutsch</option>
                <option value="EN">English</option>
                <option value="CH">Deutsch (CH)</option>
                <option value="DK">Dansk</option>
                <option value="FR">Fran&ccedil;ais</option>
                <option value="NL">Nederlands</option>
              </select>
            </div>
            <div class="field-row">
              <label for="sigType">Typ</label>
              <select id="sigType">
                <option value="long">Lang (ausf&uuml;hrlich)</option>
                <option value="short">Kurz (kompakt)</option>
              </select>
            </div>

            <div class="block-list-header">
              <span class="block-list-label">Bausteine</span>
            </div>
            <div id="block-list" class="block-list"></div>
            <div class="sig-actions">
              <button id="add-block-btn" class="btn btn-secondary btn-small" type="button">+ Baustein</button>
              <button id="add-custom-block-btn" class="btn btn-secondary btn-small" type="button">+ Eigener</button>
              <button id="delete-sig-btn" class="btn btn-danger btn-small" type="button">L&ouml;schen</button>
            </div>

            <!-- Block Picker (hidden by default) -->
            <div id="block-picker" class="block-picker hidden">
              <div class="field-row" style="margin-top:8px;">
                <label for="pickerCategory">Kategorie</label>
                <select id="pickerCategory">
                  <option value="all">Alle</option>
                  <option value="layout">Layout</option>
                  <option value="greeting">Gru&szlig;</option>
                  <option value="contact">Kontakt</option>
                  <option value="address">Adresse</option>
                  <option value="legal">Rechtliches</option>
                  <option value="banner">Banner</option>
                  <option value="zertifizierung">Zertifizierung</option>
                </select>
              </div>
              <div id="picker-list" class="picker-list"></div>
            </div>

            <!-- Custom Block Creator (hidden by default) -->
            <div id="custom-block-creator" class="custom-block-creator hidden">
              <h3>Eigener Baustein</h3>
              <div class="field-row">
                <label for="customBlockName">Name</label>
                <input type="text" id="customBlockName" placeholder="z.B. Mein Banner">
              </div>
              <div style="margin-top:6px;">
                <label style="font-size:12px; color:#555;">HTML-Inhalt:</label>
                <textarea id="customBlockHtml" rows="6" placeholder="<table>...</table>"></textarea>
              </div>
              <div class="sig-actions" style="margin-top:6px;">
                <button id="create-custom-btn" class="btn btn-secondary btn-small" type="button">Erstellen</button>
                <button id="cancel-custom-btn" class="btn btn-secondary btn-small" type="button">Abbrechen</button>
              </div>
            </div>

            <div class="button-row">
              <button class="btn btn-secondary btn-small save-btn" type="button">Signatur speichern</button>
            </div>
          </div>

          <!-- Preset Quick Start (shown when creating new signature) -->
          <div id="preset-section" class="hidden" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee;">
            <h3>Von Vorlage starten</h3>
            <div class="field-row">
              <label for="presetSelect">Vorlage</label>
              <select id="presetSelect"></select>
            </div>
            <div class="sig-actions">
              <button id="apply-preset-btn" class="btn btn-secondary btn-small" type="button">Vorlage anwenden</button>
              <button id="cancel-preset-btn" class="btn btn-secondary btn-small" type="button">Leer starten</button>
            </div>
          </div>
        </div>
      </details>

      <!-- Vorschau & Einfügen -->
      <details class="form-section accordion" open>
        <summary><h2>Vorschau &amp; Einf&uuml;gen</h2></summary>
        <div class="accordion-content">
          <div class="preview-header">
            <div style="flex:1;"></div>
            <button id="popout-preview-btn" class="btn btn-secondary btn-small" type="button"
                    title="Vorschau vergr&ouml;&szlig;ern">&#x26F6; Vergr&ouml;&szlig;ern</button>
          </div>
          <div id="preview-container" class="signature-preview">
            <p class="info-text">Vorschau wird geladen...</p>
          </div>
          <div class="button-row">
            <button id="insert-btn" class="btn btn-primary">Signatur in E-Mail einf&uuml;gen</button>
          </div>
        </div>
      </details>

      <!-- Status messages -->
      <div id="save-status" class="hidden">
        <p id="save-message" class="success-text"></p>
      </div>
    </div>
  </div>

  <script type="text/javascript" src="../lib/templateEngine.js"></script>
  <script type="text/javascript" src="../lib/officeMapping.js"></script>
  <script type="text/javascript" src="../lib/blockLoader.js"></script>
  <script type="text/javascript" src="../lib/settingsManager.js"></script>
  <script type="text/javascript" src="../lib/graphClient.js"></script>
  <script type="text/javascript" src="../lib/signatureComposer.js"></script>
  <script type="text/javascript" src="taskpane.js"></script>
</body>
</html>
