<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>acadon Signatur</title>
  <link rel="stylesheet" href="taskpane.css">
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>acadon Signatur</h1>
    </header>

    <!-- Loading -->
    <div id="loading" class="panel">
      <div class="spinner"></div>
      <p class="info-text">Lade Benutzerdaten...</p>
    </div>

    <!-- Error -->
    <div id="error-panel" class="panel hidden">
      <p class="error-text" id="error-message"></p>
      <button id="retry-btn" class="btn btn-secondary">Erneut versuchen</button>
    </div>

    <!-- Main Form -->
    <div id="main-form" class="panel hidden">

      <!-- User Data (read-only info) -->
      <section class="form-section">
        <h2>Benutzerdaten</h2>
        <div class="field-row">
          <label for="firstName">Vorname</label>
          <input type="text" id="firstName" readonly>
        </div>
        <div class="field-row">
          <label for="lastName">Nachname</label>
          <input type="text" id="lastName" readonly>
        </div>
        <div class="field-row">
          <label for="email">E-Mail</label>
          <input type="text" id="email" readonly>
        </div>
        <div class="field-row">
          <label for="office">Standort</label>
          <input type="text" id="office" readonly>
        </div>
      </section>

      <!-- Editable overrides -->
      <section class="form-section">
        <h2>Anpassungen</h2>
        <div class="field-row">
          <label for="jobTitle">Titel / Position</label>
          <input type="text" id="jobTitle" placeholder="Aus Azure AD">
        </div>
        <div class="field-row">
          <label for="phone">Telefon</label>
          <input type="text" id="phone" placeholder="Aus Azure AD">
        </div>
        <div class="field-row">
          <label for="address">Adresse</label>
          <input type="text" id="address" readonly>
        </div>
      </section>

      <!-- Signatures -->
      <section class="form-section">
        <h2>Meine Signaturen</h2>
        <div class="field-row">
          <label for="language">Sprache</label>
          <select id="language">
            <option value="DE">Deutsch</option>
            <option value="EN">English</option>
            <option value="CH">Deutsch (CH)</option>
            <option value="DK">Dansk</option>
            <option value="FR">Fran&ccedil;ais</option>
            <option value="NL">Nederlands</option>
          </select>
        </div>
        <div class="field-row">
          <label for="signatureSelect">Signatur</label>
          <select id="signatureSelect"></select>
        </div>
        <div class="sig-actions">
          <button id="new-sig-btn" class="btn btn-secondary btn-small" type="button">+ Neue Signatur</button>
          <button id="delete-sig-btn" class="btn btn-danger btn-small" type="button">Signatur l&ouml;schen</button>
        </div>

        <div class="field-row" style="margin-top:10px;">
          <label for="assignNewMessage">Neue Nachrichten</label>
          <select id="assignNewMessage"></select>
        </div>
        <div class="field-row">
          <label for="assignReply">Antworten</label>
          <select id="assignReply"></select>
        </div>
      </section>

      <!-- Signature Editor -->
      <section id="sig-editor-section" class="form-section hidden">
        <h2>Signatur bearbeiten</h2>
        <div class="field-row">
          <label for="sigName">Name</label>
          <input type="text" id="sigName" placeholder="z.B. Standard Deutsch">
        </div>
        <div class="block-list-header">
          <span class="block-list-label">Bausteine</span>
        </div>
        <div id="block-list" class="block-list"></div>
        <button id="add-block-btn" class="btn btn-secondary btn-small" type="button">+ Baustein hinzuf&uuml;gen</button>

        <!-- Block Picker (hidden by default) -->
        <div id="block-picker" class="block-picker hidden">
          <div class="field-row" style="margin-top:8px;">
            <label for="pickerCategory">Kategorie</label>
            <select id="pickerCategory">
              <option value="all">Alle</option>
              <option value="greeting">Gru&szlig;</option>
              <option value="contact">Kontakt</option>
              <option value="branding">Branding</option>
              <option value="address">Adresse</option>
              <option value="legal">Rechtliches</option>
              <option value="banner">Banner</option>
              <option value="zertifizierung">Zertifizierung</option>
            </select>
          </div>
          <div id="picker-list" class="picker-list"></div>
        </div>
      </section>

      <!-- Preset Quick Start (shown when creating new signature) -->
      <div id="preset-section" class="form-section hidden">
        <h2>Von Vorlage starten</h2>
        <div class="field-row">
          <label for="presetSelect">Vorlage</label>
          <select id="presetSelect"></select>
        </div>
        <div class="sig-actions">
          <button id="apply-preset-btn" class="btn btn-secondary btn-small" type="button">Vorlage anwenden</button>
          <button id="cancel-preset-btn" class="btn btn-secondary btn-small" type="button">Leer starten</button>
        </div>
      </div>

      <!-- Preview -->
      <section class="form-section">
        <h2>Vorschau</h2>
        <div id="preview-container" class="signature-preview">
          <p class="info-text">Vorschau wird geladen...</p>
        </div>
      </section>

      <!-- Action buttons -->
      <div class="button-row">
        <button id="insert-btn" class="btn btn-primary">Signatur einf&uuml;gen</button>
        <button id="save-btn" class="btn btn-secondary" style="margin-top: 8px;">Einstellungen speichern</button>
      </div>

      <!-- Status messages -->
      <div id="save-status" class="hidden">
        <p id="save-message" class="success-text"></p>
      </div>
    </div>
  </div>

  <script type="text/javascript" src="../lib/templateEngine.js"></script>
  <script type="text/javascript" src="../lib/officeMapping.js"></script>
  <script type="text/javascript" src="../lib/blockLoader.js"></script>
  <script type="text/javascript" src="../lib/settingsManager.js"></script>
  <script type="text/javascript" src="../lib/graphClient.js"></script>
  <script type="text/javascript" src="../lib/signatureComposer.js"></script>
  <script type="text/javascript" src="taskpane.js"></script>
</body>
</html>
